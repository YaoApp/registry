name: PR Unit Test

on:
  pull_request:
    branches: [main]

jobs:
  pr-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.25"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Code Quality
        run: |
          make vet
          make fmt-check

      - name: Run Unit Tests
        run: make unit-test

      - name: Run E2E Tests
        run: make e2e-test

      - name: Build Binary
        run: make build

      - name: Verify Binary
        run: dist/registry version

      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          flags: unittests
          fail_ci_if_error: false
