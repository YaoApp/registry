name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0). Leave empty to use version from code."
        required: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  IMAGE_NAME: yaoapp/registry

jobs:
  # ===================================================================
  # Test
  # ===================================================================
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.25"]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Code Quality
        run: |
          make vet
          make fmt-check

      - name: Run Unit Tests
        run: make unit-test

      - name: Run E2E Tests
        run: make e2e-test

      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          flags: release
          fail_ci_if_error: false

  # ===================================================================
  # Build Linux Binaries (amd64 + arm64)
  # ===================================================================
  build-linux:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.25"]
        arch: [amd64, arm64]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Get Version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep 'var Version' handlers/info.go | awk '{print $4}' | sed 's/"//g')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Build linux/${{ matrix.arch }}
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X github.com/yaoapp/registry/handlers.Version=${{ steps.version.outputs.version }}" \
            -o dist/registry-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }} .
          chmod +x dist/registry-*

      - name: Verify (amd64 only)
        if: matrix.arch == 'amd64'
        run: dist/registry-${{ steps.version.outputs.version }}-linux-amd64 version

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: registry-linux-${{ matrix.arch }}
          path: dist/registry-*

  # ===================================================================
  # Build macOS Binaries (amd64 + arm64)
  # ===================================================================
  build-darwin:
    needs: test
    runs-on: macos-latest
    strategy:
      matrix:
        go: ["1.25"]
        arch: [amd64, arm64]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Get Version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep 'var Version' handlers/info.go | awk '{print $4}' | sed 's/"//g')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Build darwin/${{ matrix.arch }}
        env:
          CGO_ENABLED: "0"
          GOOS: darwin
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X github.com/yaoapp/registry/handlers.Version=${{ steps.version.outputs.version }}" \
            -o dist/registry-${{ steps.version.outputs.version }}-darwin-${{ matrix.arch }} .
          chmod +x dist/registry-*

      - name: Verify (arm64 on Apple Silicon runner)
        if: matrix.arch == 'arm64'
        run: dist/registry-${{ steps.version.outputs.version }}-darwin-arm64 version

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: registry-darwin-${{ matrix.arch }}
          path: dist/registry-*

  # ===================================================================
  # GitHub Release (tag push only)
  # ===================================================================
  release:
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List Artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/registry-*
          generate_release_notes: true

  # ===================================================================
  # Docker Image (after release, multi-platform linux/amd64 + linux/arm64)
  # ===================================================================
  docker:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Verify Image
        run: |
          docker pull ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          docker run --rm ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} registry version
